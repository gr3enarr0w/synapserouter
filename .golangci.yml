version: "2"

# golangci-lint configuration for synapserouter

linters:
  enable:
    - errcheck
    - staticcheck
    - govet
    - gosec
    - revive
    - ineffassign
    - misspell
    - unconvert
  settings:
    errcheck:
      exclude-functions:
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Fprint
        - fmt.Printf
        - fmt.Println
        - io.Copy
        - (io.Closer).Close
        - (*os.File).Close
        - (*net/http.Response).Body.Close
        - (net/http.ResponseWriter).Write
        - (*database/sql.DB).Close
        - (*database/sql.Rows).Close
        - (*database/sql.Stmt).Close
        - (*encoding/json.Encoder).Encode
        - (*encoding/json.Decoder).Decode
        - os.RemoveAll
        - (*os.File).Write
        - (*os.File).WriteString
        - os.MkdirAll
        - os.WriteFile
        - (*database/sql.Tx).Rollback
        - (*strings.Builder).WriteString
        - (*strings.Builder).Write
        - (*bytes.Buffer).WriteString
        - (*bytes.Buffer).Write
        - json.Unmarshal
        - (*flag.FlagSet).Parse
        - (*golang.org/x/term).Restore
        - filepath.WalkDir
        - filepath.Walk
        - (*database/sql.DB).Exec
        - (*database/sql.Tx).Exec
        - (*github.com/joho/godotenv).Load
        - godotenv.Load
    revive:
      rules:
        - name: exported
          disabled: true
    gosec:
      excludes:
        - G104  # covered by errcheck
        - G204  # subprocess by design (agent bash tool)
        - G301  # dir perms 0755 standard
        - G302  # file perms 0644 standard
        - G304  # file inclusion by design (agent tools)
        - G306  # WriteFile perms 0644 standard
        - G101  # false positives on field names
        - G107  # HTTP with variable URL (test + proxy)
        - G115  # uintptr→int safe for fd
        - G117  # marshaled secret field (config)
        - G118  # background goroutine by design
        - G120  # form parsing (test code)
        - G404  # weak RNG for shuffling
        - G703  # path traversal (config files, agent tools)
        - G704  # SSRF (proxy handler by design)
        - G706  # log injection (env vars, not user input)
        - G122  # WalkDir TOCTOU (agent-controlled paths)
    staticcheck:
      checks:
        - all
        - "-QF1012"  # style preference, not correctness
        - "-ST1000"  # package comments — not enforced

issues:
  max-issues-per-linter: 200
  max-same-issues: 50

formatters:
  exclusions:
    paths:
      - _test\.go

run:
  timeout: 5m
