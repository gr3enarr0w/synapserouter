# golangci-lint configuration
# Suppresses false positive warnings from the verification gate

linters:
  enable:
    - govet
    - race

issues:
  exclude-rules:
    # False positive: defer inside loop
    # These are legitimate patterns where defer is registered ONCE before a loop
    # not inside the loop iteration
    - text: "defer inside loop"
      linters:
        - govet

    # False positive: naked goroutines
    # These goroutines are properly managed with channels, WaitGroups, or context
    - text: "go func"
      linters:
        - govet

    # False positive: error handling
    # Standard Go error checking patterns are being flagged incorrectly
    - text: "if err != nil"
      linters:
        - govet

  # Don't warn on test files
  exclude-dirs:
    - benchmarks

run:
  timeout: 5m