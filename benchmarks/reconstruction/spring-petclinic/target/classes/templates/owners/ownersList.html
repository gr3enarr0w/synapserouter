<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::body/div}, 'Owners')}">
<body>
<div>
  <h2>Owners</h2>
  <table class="table table-striped">
    <thead>
    <tr>
      <th>Name</th>
      <th>Address</th>
      <th>City</th>
      <th>Telephone</th>
      <th>Pets</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="owner : ${listOwners}">
      <td>
        <a th:href="@{/owners/{ownerId}(ownerId=${owner.id})}"
           th:text="${owner.firstName + ' ' + owner.lastName}">Name</a>
      </td>
      <td th:text="${owner.address}">Address</td>
      <td th:text="${owner.city}">City</td>
      <td th:text="${owner.telephone}">Phone</td>
      <td>
        <span th:each="pet, iterStat : ${owner.pets}"
              th:text="${pet.name + (iterStat.last ? '' : ', ')}">Pet</span>
      </td>
    </tr>
    </tbody>
  </table>

  <nav th:if="${totalPages > 1}">
    <ul class="pagination">
      <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
        <a class="page-link" th:href="@{/owners(page=${currentPage - 1}, lastName=${owner.lastName})}">Previous</a>
      </li>
      <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPages)}"
          th:classappend="${i == currentPage} ? 'active'">
        <a class="page-link" th:href="@{/owners(page=${i}, lastName=${owner.lastName})}" th:text="${i}">1</a>
      </li>
      <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
        <a class="page-link" th:href="@{/owners(page=${currentPage + 1}, lastName=${owner.lastName})}">Next</a>
      </li>
    </ul>
  </nav>
</div>
</body>
</html>
