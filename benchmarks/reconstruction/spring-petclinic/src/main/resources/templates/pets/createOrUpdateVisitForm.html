<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::body/div}, 'New Visit')}">
<body>
<div>
  <h2>New Visit</h2>
  <h3>Pet: <span th:text="${pet.name}">Pet Name</span></h3>
  <table class="table table-striped" style="width:600px;" th:if="${!pet.visits.isEmpty()}">
    <thead>
    <tr>
      <th>Date</th>
      <th>Description</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="visit : ${pet.visits}">
      <td th:text="${#temporals.format(visit.date, 'yyyy-MM-dd')}">2013-01-01</td>
      <td th:text="${visit.description}">Description</td>
    </tr>
    </tbody>
  </table>
  <form th:object="${visit}"
        th:action="@{/owners/{ownerId}/pets/{petId}/visits/new(ownerId=${owner.id}, petId=${pet.id})}"
        method="post">
    <div class="mb-3">
      <label class="form-label">Date</label>
      <input class="form-control" type="date" th:field="*{date}"/>
    </div>
    <div class="mb-3">
      <label class="form-label">Description</label>
      <input class="form-control" type="text" th:field="*{description}"/>
    </div>
    <button class="btn btn-primary" type="submit">Add Visit</button>
  </form>
</div>
</body>
</html>
